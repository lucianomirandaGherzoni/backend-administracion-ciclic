<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Ciclic Admin</title>
  <link rel="icon" type="image/png" href="img/ciclic-logo-3.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="css/modern.css" />
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <div class="login-container">
    <div class="login-image-section">
      <div class="login-image-content">
        <h1>Gestión<br>Web Ciclic</h1>
        <div class="login-image-divider"></div>
        <p>Tu panel para gestionar<br>tu página web.</p>
      </div>
    </div>

    <div class="login-form-section">
      <div class="login-form-wrapper">

        <div class="login-form-brand">
          <div class="login-form-brand-logo">
            <img src="img/ciclic-logo-3.png" alt="Ciclic" />
          </div>
          <div class="login-form-brand-info">
            <span class="login-form-brand-name">Ciclic</span>
            <span class="login-form-brand-tag">Admin Dashboard</span>
          </div>
        </div>

        <div class="login-header">
          <h2>Iniciar Sesión</h2>
          <p>Ingresá tus credenciales para acceder al panel</p>
        </div>

        <form id="form-login">
          <div class="form-group">
            <label>Usuario</label>
            <div class="input-wrapper">
              <i class="ti ti-user input-icon"></i>
              <input type="text" id="username" class="form-input" placeholder="Tu usuario" required />
            </div>
          </div>

          <div class="form-group">
            <label>Contraseña</label>
            <div class="input-wrapper">
              <i class="ti ti-lock input-icon"></i>
              <input type="password" id="password" class="form-input" placeholder="••••••••" required />
            </div>
          </div>

          <button type="submit" class="btn-login">
            Ingresar al Panel
          </button>
        </form>

        <p class="login-footer-credit">Ciclic &mdash; Sistema de Gestión</p>
      </div>
    </div>
  </div>

  <div id="contenedor-notificaciones" class="contenedor-notificaciones"></div>

  <script type="module" src="js/controllers/login.js"></script>
</body>

</html>
